<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Gestión de Categorías</title>
  <link rel="stylesheet" href="../../../style.css">
</head>
<body>

  <!-- Header superior del panel admin -->
  <header class="admin-header">
    <div class="header-left">
      <span class="logo-icon">🍕</span>
      <span class="logo-text">Food Store</span>
    </div>
    <div class="header-right">
      <a href="../../store/home/home.html" class="nav-link">Tienda</a>
      <a href="../home/home.html" class="nav-link">Panel Admin</a>
      <span class="nav-link disabled">Admin Sistema</span>
      <button id="logoutButton" class="btn-logout">Cerrar Sesión</button>
    </div>
  </header>

  <div class="admin-layout">
    <!-- Sidebar lateral -->
    <aside class="sidebar">
      <div class="sidebar-title">
        <h3>Administración</h3>
        <p>Panel de control</p>
      </div>
      <nav class="sidebar-menu">
        <a href="../home/home.html" class="menu-item">
          <span class="icon">📊</span> Dashboard
        </a>
        <a href="./categories.html" class="menu-item active">
          <span class="icon">📁</span> Categorías
        </a>
        <a href="../products/products.html" class="menu-item">
          <span class="icon">🍔</span> Productos
        </a>
        <a href="../orders/orders.html" class="menu-item">
          <span class="icon">📦</span> Pedidos
        </a>
      </nav>
      <div class="sidebar-footer">
        <a href="../../store/home/home.html" class="menu-item-store">
          <span class="icon">🏪</span> Ver Tienda
        </a>
      </div>
    </aside>

    <!-- Contenido principal -->
    <main class="main-content">
      <div class="content-header" style="display:flex;justify-content:space-between;align-items:center;">
        <h2>Gestión de Categorías</h2>
        <!-- Botón para agregar nueva categoría -->
        <a href="./newCat/newCat.html" class="btn-primary">➕ Nueva Categoría</a>
      </div>

      <div class="table-container shadow-card">
        <table class="admin-table">
          <thead>
            <tr>
              <th style="width: 10%;">ID</th>
              <th style="width: 30%;">Nombre</th>
              <th style="width: 50%;">Descripción</th>
              <th style="width: 10%;">Acciones</th>
            </tr>
          </thead>
          <tbody id="categoriesTableBody">
            <tr>
              <td colspan="4" class="text-center">Cargando categorías...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- Importa el JS compilado -->
  <script type="module" src="./categories.js"></script>
</body>
</html>
