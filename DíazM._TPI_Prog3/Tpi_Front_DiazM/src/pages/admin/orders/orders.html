<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Gestión de Pedidos</title>
  <link rel="stylesheet" href="../../../style.css">
</head>
<body>

  <header class="admin-header">
    <div class="header-left">
      <span class="logo-icon">📦</span>
      <span class="logo-text">Food Store</span>
    </div>
    <div class="header-right">
      <a href="../../store/home/home.html" class="nav-link">Tienda</a>
      <a href="../home/home.html" class="nav-link">Panel Admin</a>
      <span class="nav-link disabled">Admin Sistema</span>
      <button id="logoutButton" class="btn-logout">Cerrar Sesión</button>
    </div>
  </header>

  <div class="admin-layout">
    <aside class="sidebar">
      <div class="sidebar-title">
        <h3>Administración</h3>
        <p>Panel de control</p>
      </div>
      <nav class="sidebar-menu">
        <a href="../home/home.html" class="menu-item">📊 Dashboard</a>
        <a href="../categories/categories.html" class="menu-item">📁 Categorías</a>
        <a href="../products/products.html" class="menu-item">🍔 Productos</a>
        <a href="./orders.html" class="menu-item active">📦 Pedidos</a>
      </nav>
      <div class="sidebar-footer">
        <a href="../../store/home/home.html" class="menu-item-store">🏪 Ver Tienda</a>
      </div>
    </aside>

    <main class="main-content">
      <div class="content-header" style="display:flex;justify-content:space-between;align-items:center;">
        <h2>Gestión de Pedidos</h2>
        <select id="filtroEstado" class="filter-select">
          <option value="todos">Todos los estados</option>
          <option value="pending">Pendientes</option>
          <option value="processing">En Preparación</option>
          <option value="completed">Completados</option>
          <option value="cancelled">Cancelados</option>
        </select>
      </div>

      <div class="table-container shadow-card">
        <table class="admin-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Cliente</th>
              <th>Fecha</th>
              <th>Productos</th>
              <th>Estado</th>
              <th>Total</th>
            </tr>
          </thead>
          <tbody id="ordersTableBody">
            <tr>
              <td colspan="6" class="text-center">Cargando pedidos...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script type="module" src="./orders.js"></script>
</body>
</html>
