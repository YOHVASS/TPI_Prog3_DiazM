<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Store - Login</title>
    <link rel="stylesheet" href="../../../style.css">
    <style>
        /* Estilo rápido para centrar el formulario si tu style.css no lo hace */
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #c45e85; /* Color de fondo suave */
        }
        form {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        div { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        
        button {
            width: 100%;
            padding: 10px;
            background-color: #e67e22; /* El naranja de tu botón principal */
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #d35400; }
    </style>
</head>

<body>
    <h1> FOOD STORE </h1>
    <h1>Iniciar Sesión</h1>

    <form id="form">
        <div>
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required autocomplete="off" placeholder="usuario@foodstore.com">
        </div>
        <div>
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" required autocomplete="off" placeholder="********">
        </div>
        <div>
            <label for="rol">Rol</label>
            <select name="rol" id="rol" required>
                <option value="">Seleccione un rol</option>
                <option value="client">Cliente</option>
                <option value="admin">Admin</option>
            </select>
        </div>

        <button type="submit">Ingresar</button>
<div class="login-demo-box">
          <p class="eyebrow">Usuarios de prueba</p>
          <dl>
            <dt>Admin</dt>
            <dd>admin@foodstore.com / 123456</dd>
            <dt>Cliente</dt>
            <dd>cliente@food.com / cliente123</dd>
          </dl>
        </div>

        
    </form>

    <script type="module" src="./login.ts"></script>
</body>
</html>
