<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrar Producto</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .form-container {
      background-color: #ffffff;
      border-radius: 10px;
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.15);
      padding: 30px;
      width: 400px;
      text-align: center;
    }

    .form-container h3 {
      color: #2e7d32;
      margin-bottom: 20px;
    }

    .admin-form label {
      display: block;
      text-align: left;
      margin-bottom: 5px;
      font-weight: bold;
      color: #388e3c;
    }

    .admin-form input,
    .admin-form textarea,
    .admin-form select {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #a5d6a7;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.3s;
    }

    .admin-form input:focus,
    .admin-form textarea:focus,
    .admin-form select:focus {
      border-color: #66bb6a;
    }

    .form-actions {
      display: flex;
      justify-content: space-between;
    }

    .btn-primary {
      background-color: #4caf50;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      transition: background-color 0.3s;
    }

    .btn-primary:hover {
      background-color: #388e3c;
    }

    .btn-secondary {
      background-color: #a5d6a7;
      color: #2e7d32;
      border: none;
      padding: 10px 15px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      transition: background-color 0.3s;
    }

    .btn-secondary:hover {
      background-color: #81c784;
    }
  </style>
</head>
<body>
  <div class="form-container shadow-card">
    <h3>✨ Registrar Nuevo Producto</h3>
    <form id="addProductForm" class="admin-form">
      <label for="prodNombre">Nombre *</label>
      <input type="text" id="prodNombre" required>

      <label for="prodDescripcion">Descripción *</label>
      <textarea id="prodDescripcion" required></textarea>

      <label for="prodPrecio">Precio *</label>
      <input type="number" id="prodPrecio" required min="1" step="0.01">

      <label for="prodCategoria">Categoría *</label>
      <select id="prodCategoria" required>
        <option value="">Seleccione...</option>
        <option value="Bebidas">Bebidas</option>
        <option value="Comidas">Comidas</option>
        <option value="Postres">Postres</option>
      </select>

      <label for="prodStock">Stock *</label>
      <input type="number" id="prodStock" required min="1">

      <label for="prodImagen">Imagen (URL)</label>
      <input type="text" id="prodImagen">

      <div class="form-actions">
        <button type="button" class="btn-secondary" onclick="window.history.back()">Cancelar</button>
        <button type="submit" class="btn-primary">Guardar Producto</button>
      </div>
    </form>
  </div>

  <!-- Conectás el TS/JS que guarda el producto -->
  <script type="module" src="./new.js"></script>
</body>
</html>
