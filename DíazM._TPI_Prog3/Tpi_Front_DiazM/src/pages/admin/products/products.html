<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Gestión de Productos</title>
  <link rel="stylesheet" href="../../../style.css">
</head>
<body>
  <header class="admin-header">
    <div class="header-left">
      <span class="logo-icon">🍕</span>
      <span class="logo-text">Food Store</span>
    </div>
    <div class="header-right">
      <a href="../../store/home/home.html" class="nav-link">Tienda</a>
      <a href="../home/home.html" class="nav-link">Panel Admin</a>
      <span class="nav-link disabled">Admin Sistema</span>
      <button id="logoutButton" class="btn-logout">Cerrar Sesión</button>
    </div>
  </header>

  <div class="admin-layout">
    <aside class="sidebar">
      <nav class="sidebar-menu">
        <a href="../home/home.html" class="menu-item">📊 Dashboard</a>
        <a href="../categories/categories.html" class="menu-item">📁 Categorías</a>
        <a href="./products.html" class="menu-item active">🍔 Productos</a>
        <a href="../orders/orders.html" class="menu-item">📦 Pedidos</a>
      </nav>
    </aside>

    <main class="main-content">
      <div class="content-header" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
        <h2>Gestión de Productos</h2>
        <a href="./new.html" class="btn-logout" style="background-color:#ff4757;color:white;text-decoration:none;padding:10px 15px;border-radius:6px;font-weight:bold;">
          ➕ Nuevo Producto
        </a>
      </div>

      <div class="table-container shadow-card">
        <table class="admin-table">
          <thead>
            <tr>
              <th>ID</th><th>Imagen</th><th>Nombre</th><th>Descripción</th>
              <th>Precio</th><th>Categoría</th><th>Stock</th><th>Estado</th>
            </tr>
          </thead>
          <tbody id="productsTableBody">
            <tr><td colspan="8" class="text-center">Cargando productos...</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script type="module" src="./products.js"></script>
</body>
</html>
